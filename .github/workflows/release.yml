name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Build binaries
        run: |
          GOOS=linux   GOARCH=amd64 go build -o b00p_linux_amd64 .
          GOOS=linux   GOARCH=arm64 go build -o b00p_linux_arm64 .
          GOOS=darwin  GOARCH=amd64 go build -o b00p_darwin_amd64 .
          GOOS=darwin  GOARCH=arm64 go build -o b00p_darwin_arm64 .
          GOOS=windows GOARCH=amd64 go build -o b00p_windows_amd64.exe .

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            b00p_linux_amd64
            b00p_linux_arm64
            b00p_darwin_amd64
            b00p_darwin_arm64
            b00p_windows_amd64.exe
